{% extends 'base.html' %}

{% block content %}
<style>
    .tf-form-container {
        max-width: 800px;
        margin: 2rem auto;
        padding: 2rem;
        background-color: #ffffff;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
        color: #2196F3;
        margin-bottom: 1.5rem;
    }
    .form-group {
        margin-bottom: 1.5rem;
    }
    label {
        font-weight: bold;
        margin-bottom: 0.5rem;
        display: block;
    }
    input[type="text"], textarea, select {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
    }
    button {
        background-color: #2196F3;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }
    button:hover {
        background-color: #1976D2;
    }
</style>

<div class="tf-form-container">
    <h1>Aggiungi una Domanda Vero/Falso</h1>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.text.id_for_label }}">Domanda:</label>
            {{ form.text }}
        </div>
        <div class="form-group">
            <label for="{{ form.answer.id_for_label }}">Risposta:</label>
            {{ form.answer }}
        </div>
        <div class="form-group">
            <label for="{{ form.points.id_for_label }}">Punti:</label>
            {{ form.points }}
        </div>
        <button type="submit">Salva Domanda</button>
    </form>
</div>
{% endblock %}
