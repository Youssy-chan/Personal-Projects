{% extends 'base.html' %}

{% block title %}{{ quiz.name }} - DETTAGLI QUIZ{% endblock %}

{% block content %}
<style>
    .quiz-container {
        max-width: 800px;
        margin: 2rem auto;
        padding: 2rem;
        background-color: #ffffff;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .quiz-title {
        color: #2196F3;
        font-size: 2.5rem;
        margin-bottom: 1rem;
    }
    .quiz-description {
        background-color: #f8f9fa;
        padding: 1rem;
        border-radius: 5px;
        margin-bottom: 2rem;
    }
    .quiz-description h2 {
        color: #333;
        font-size: 1.2rem;
        margin-bottom: 0.5rem;
    }
    .quiz-description p {
        color: #666;
        line-height: 1.6;
    }
    .quiz-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .quiz-questions {
        font-size: 1.1rem;
        color: #666;
    }
    .quiz-questions i {
        color: #2196F3;
        margin-right: 0.5rem;
    }
    .start-quiz-btn {
        display: inline-block;
        background: linear-gradient(45deg, #2196F3, #21CBF3);
        color: white;
        text-decoration: none;
        padding: 0.8rem 1.5rem;
        border-radius: 25px;
        font-weight: bold;
        transition: all 0.3s ease;
    }
    .start-quiz-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .start-quiz-btn i {
        margin-right: 0.5rem;
    }
</style>

<div class="quiz-container">
    <h1 class="quiz-title">{{ quiz.name }}</h1>
    
    <div class="quiz-description">
        <h2>Descrizione:</h2>
        <p>{{ quiz.description }}</p>
    </div>
    
    <div class="quiz-info">
        <p class="quiz-questions">
            <i class="fas fa-question-circle" style="color: #2196F3;"></i>
            Numero di domande: <strong>{{ quiz.questions.count }}</strong>
        </p>
        <a href="{% url 'quiz_question' quiz_id=quiz.pk question_index=1 %}" class="start-quiz-btn">
            <i class="fas fa-play"></i> Inizia Quiz
        </a>
    </div>
</div>
{% endblock %}
