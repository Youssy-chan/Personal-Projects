{% extends 'base.html' %}

{% block content %}
<style>
    .cloze-form-container {
        max-width: 800px;
        margin: 2rem auto;
        padding: 2rem;
        background-color: #ffffff;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
        color: #2196F3;
        margin-bottom: 1.5rem;
        font-size: 2rem;
    }
    form {
        display: flex;
        flex-direction: column;
    }
    .form-group {
        margin-bottom: 1.5rem;
    }
    label {
        font-weight: bold;
        margin-bottom: 0.5rem;
        display: block;
        color: #333;
    }
    input[type="text"], textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
        transition: border-color 0.3s ease;
    }
    input[type="text"]:focus, textarea:focus {
        outline: none;
        border-color: #2196F3;
        box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
    }
    button {
        background-color: #2196F3;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        align-self: flex-start;
    }
    button:hover {
        background-color: #1976D2;
    }
</style>

<div class="cloze-form-container">
    <h1>Aggiungi una Domanda di Completamento</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salva Domanda</button>
    </form>
</div>
{% endblock %}
