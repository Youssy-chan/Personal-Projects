{% extends 'base.html' %}
{% block title %}Logout{% endblock %}

{% block content %}
<div class="container">
    <h2>Logout</h2>
    <p>Sei sicuro di voler uscire?</p>
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>
</div>
{% endblock %}
