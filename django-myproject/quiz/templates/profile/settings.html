{% extends "profile.html" %}
{% block profile_content %}
<style>
    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
    }
    .form-container {
        max-width: 600px;
        margin: 2rem auto;
        padding: 2rem;
        background-color: #ffffff;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .form-title {
        color: #2196F3;
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        text-align: center;
    }
    .form-field {
        margin-bottom: 1rem;
    }
    .form-field label {
        display: block;
        margin-bottom: 0.5rem;
        color: #333;
    }
    .form-field input, .form-field select, .form-field textarea {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #ddd;
        border-radius: 5px;
    }
    .submit-button {
        display: block;
        width: 100%;
        padding: 0.8rem;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        transition: all 0.3s ease;
        cursor: pointer;
        background: linear-gradient(45deg, #2196F3, #21CBF3);
        color: white;
        text-align: center;
    }
    .submit-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
</style>

<div class="container">
    <div class="form-container">
        <h2 class="form-title">Impostazioni Profilo</h2>
        <form method="post" class="profile-form">
            {% csrf_token %}
            {% for field in profile_form %}
                <div class="form-field">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                        <div class="error">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="submit-button">
                <i class="fas fa-save"></i> Salva profilo
            </button>
        </form>
    </div>
</div>
{% endblock %}
